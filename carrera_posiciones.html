<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuervos Mundialistas 🦅</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f8f8f6; color: #1a1a1a; padding: 1.5rem; }
  .hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
  h1 { font-size: 20px; font-weight: 500; }
  .subtitle { font-size: 13px; color: #888; margin-top: 2px; }
  .date-pill { font-size: 12px; color: #555; background: white; padding: 4px 12px; border-radius: 20px; border: 1px solid #e0e0e0; }
  .tabs { display: flex; gap: 0; margin-bottom: 1.25rem; border-bottom: 2px solid #e8e8e6; }
  .tab { font-size: 14px; padding: 8px 20px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; }
  .tab:hover { color: #1a1a1a; }
  .tab.active { color: #1a1a1a; font-weight: 500; border-bottom: 2px solid #1a1a1a; }
  .panel { display: none; }
  .panel.active { display: block; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .play-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 6px 16px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: 500; }
  .play-btn:hover { background: #f0f0ee; }
  .timeline { display: flex; gap: 6px; flex-wrap: wrap; }
  .dbtn { font-size: 12px; padding: 4px 10px; border-radius: 8px; border: 1px solid #e0e0e0; background: white; color: #888; cursor: pointer; transition: all 0.15s; }
  .dbtn.active { background: #1a1a1a; color: white; border-color: #1a1a1a; font-weight: 500; }
  .chart-area { background: white; border-radius: 12px; padding: 1.25rem; border: 1px solid #eee; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; height: 38px; }
  .rank { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
  .name { width: 62px; font-size: 13px; font-weight: 500; text-align: right; flex-shrink: 0; color: #1a1a1a; }
  .bar-wrap { flex: 1; height: 30px; background: #f0f0ee; border-radius: 7px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 7px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; transition: width 0.75s cubic-bezier(.4,0,.2,1); min-width: 44px; }
  .bar-pts { font-size: 12px; font-weight: 500; }
  .mover { font-size: 11px; font-weight: 600; min-width: 28px; text-align: center; flex-shrink: 0; }
  .mover.up { color: #1D9E75; }
  .mover.down { color: #D85A30; }
  .mover.same { color: #aaa; }
  .pjd { font-size: 11px; color: #999; min-width: 36px; text-align: right; flex-shrink: 0; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #f0f0ee; }
  .li { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
  .ld { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .nac-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
  .nac-card { background: white; border-radius: 12px; border: 1px solid #eee; padding: 1.25rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; }
  .nac-bandera { font-size: 48px; line-height: 1; }
  .nac-nombre { font-size: 15px; font-weight: 500; color: #1a1a1a; }
  .nac-pais { font-size: 13px; color: #555; }
  .nac-puntos { font-size: 12px; color: #999; }
  .nac-doble { font-size: 11px; color: #888; line-height: 1.4; }
  .nac-sin { font-size: 13px; color: #bbb; }
  .nac-actualizado { font-size: 12px; color: #aaa; margin-bottom: 1rem; }
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>Cuervos Mundialistas 🦅</h1>
    <p class="subtitle">Mundial 2026</p>
  </div>
  <span class="date-pill" id="date-pill">—</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('posiciones', this)">🏆 Posiciones</button>
  <button class="tab"        onclick="switchTab('nacionalidades', this)">🌍 Nacionalidades</button>
</div>

<div class="panel active" id="panel-posiciones">
  <div class="controls">
    <button class="play-btn" id="play-btn" onclick="togglePlay()">▶ Animar</button>
    <div class="timeline" id="timeline"></div>
  </div>
  <div class="chart-area">
    <div id="chart"></div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<div class="panel" id="panel-nacionalidades">
  <p class="nac-actualizado">Actualizado: 2026-06-13 19:06</p>
  <div class="nac-grid" id="nac-grid"></div>
</div>

<script>
const DATA   = [{"fecha": "2026-06-11", "posiciones": [{"Posicion": 1, "Nombre": "Luisa", "Puntos": 12, "Partidos_Jugados": 2}, {"Posicion": 1, "Nombre": "Laura", "Puntos": 12, "Partidos_Jugados": 2}, {"Posicion": 1, "Nombre": "Andrea", "Puntos": 12, "Partidos_Jugados": 2}, {"Posicion": 1, "Nombre": "Jose", "Puntos": 12, "Partidos_Jugados": 2}, {"Posicion": 1, "Nombre": "Thomas", "Puntos": 12, "Partidos_Jugados": 2}, {"Posicion": 1, "Nombre": "David", "Puntos": 12, "Partidos_Jugados": 2}, {"Posicion": 7, "Nombre": "Diego", "Puntos": 9, "Partidos_Jugados": 2}, {"Posicion": 8, "Nombre": "Sergio", "Puntos": 3, "Partidos_Jugados": 2}]}, {"fecha": "2026-06-12", "posiciones": [{"Posicion": 1, "Nombre": "Andrea", "Puntos": 24, "Partidos_Jugados": 4}, {"Posicion": 2, "Nombre": "Laura", "Puntos": 21, "Partidos_Jugados": 4}, {"Posicion": 2, "Nombre": "David", "Puntos": 21, "Partidos_Jugados": 4}, {"Posicion": 4, "Nombre": "Sergio", "Puntos": 20, "Partidos_Jugados": 4}, {"Posicion": 5, "Nombre": "Thomas", "Puntos": 18, "Partidos_Jugados": 4}, {"Posicion": 5, "Nombre": "Jose", "Puntos": 18, "Partidos_Jugados": 4}, {"Posicion": 7, "Nombre": "Luisa", "Puntos": 15, "Partidos_Jugados": 4}, {"Posicion": 8, "Nombre": "Diego", "Puntos": 12, "Partidos_Jugados": 4}]}, {"fecha": "2026-06-13", "posiciones": [{"Posicion": 1, "Nombre": "Andrea", "Puntos": 41, "Partidos_Jugados": 6}, {"Posicion": 2, "Nombre": "Thomas", "Puntos": 32, "Partidos_Jugados": 5}, {"Posicion": 3, "Nombre": "David", "Puntos": 24, "Partidos_Jugados": 6}, {"Posicion": 3, "Nombre": "Laura", "Puntos": 24, "Partidos_Jugados": 6}, {"Posicion": 5, "Nombre": "Jose", "Puntos": 21, "Partidos_Jugados": 6}, {"Posicion": 6, "Nombre": "Sergio", "Puntos": 20, "Partidos_Jugados": 6}, {"Posicion": 7, "Nombre": "Luisa", "Puntos": 18, "Partidos_Jugados": 6}, {"Posicion": 8, "Nombre": "Diego", "Puntos": 15, "Partidos_Jugados": 6}]}];
const COLORS = {"Laura": {"fill": "#5DCAA5", "text": "#085041"}, "Andrea": {"fill": "#7F77DD", "text": "#26215C"}, "Jose": {"fill": "#378ADD", "text": "#042C53"}, "David": {"fill": "#D85A30", "text": "#4A1B0C"}, "Luisa": {"fill": "#D4537E", "text": "#4B1528"}, "Thomas": {"fill": "#639922", "text": "#173404"}, "Diego": {"fill": "#BA7517", "text": "#412402"}, "Sergio": {"fill": "#888780", "text": "#2C2C2A"}};
const NAC    = {"actualizado": "2026-06-13 19:06", "cuervos": [{"nombre": "Luisa", "nacionalidades": [{"pais": "Corea del Sur", "bandera": "🇰🇷", "puntos": 6}, {"pais": "México", "bandera": "🇲🇽", "puntos": 6}], "puntos_max": 6, "sin_datos": false}, {"nombre": "Laura", "nacionalidades": [{"pais": "México", "bandera": "🇲🇽", "puntos": 6}], "puntos_max": 6, "sin_datos": false}, {"nombre": "Andrea", "nacionalidades": [{"pais": "Catar", "bandera": "🇶🇦", "puntos": 11}], "puntos_max": 11, "sin_datos": false}, {"nombre": "Jose", "nacionalidades": [{"pais": "México", "bandera": "🇲🇽", "puntos": 6}], "puntos_max": 6, "sin_datos": false}, {"nombre": "Thomas", "nacionalidades": [{"pais": "Brasil", "bandera": "🇧🇷", "puntos": 11}], "puntos_max": 11, "sin_datos": false}, {"nombre": "David", "nacionalidades": [{"pais": "Canadá", "bandera": "🇨🇦", "puntos": 6}, {"pais": "México", "bandera": "🇲🇽", "puntos": 6}], "puntos_max": 6, "sin_datos": false}, {"nombre": "Diego", "nacionalidades": [{"pais": "México", "bandera": "🇲🇽", "puntos": 6}], "puntos_max": 6, "sin_datos": false}, {"nombre": "Sergio", "nacionalidades": [{"pais": "Estados Unidos", "bandera": "🇺🇸", "puntos": 11}], "puntos_max": 11, "sin_datos": false}]};

let day = 0, playing = false, iv = null;

function switchTab(name, btn) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("panel-" + name).classList.add("active");
  btn.classList.add("active");
}

function fmt(s) {
  const [y,m,d] = s.split("-");
  const ms = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${parseInt(d)} ${ms[parseInt(m)-1]} ${y}`;
}

function prevPos(nombre, dayIdx) {
  if (dayIdx === 0) return null;
  const p = DATA[dayIdx-1].posiciones.find(p => p.Nombre === nombre);
  return p ? p.Posicion : null;
}

function medalFor(pos) {
  if (pos === 1) return { icon: "🥇", bg: "#FAC775" };
  if (pos === 2) return { icon: "🥈", bg: "#D3D1C7" };
  if (pos === 3) return { icon: "🥉", bg: "#F0997B" };
  return { icon: `#${pos}`, bg: "#f0f0ee" };
}

function moverHTML(curr, prev) {
  if (prev === null) return '<span class="mover same">—</span>';
  const d = prev - curr;
  if (d > 0) return `<span class="mover up">▲${d}</span>`;
  if (d < 0) return `<span class="mover down">▼${Math.abs(d)}</span>`;
  return '<span class="mover same">—</span>';
}

function render(idx) {
  const snap = DATA[idx];
  const maxP = Math.max(...snap.posiciones.map(p => p.Puntos), 1);
  document.getElementById("date-pill").textContent = fmt(snap.fecha);
  const sorted = [...snap.posiciones].sort((a,b) => b.Puntos - a.Puntos);
  document.getElementById("chart").innerHTML = sorted.map((p) => {
    const c    = COLORS[p.Nombre] || { fill:"#B4B2A9", text:"#2C2C2A" };
    const pct  = Math.max(Math.round((p.Puntos / maxP) * 100), 5);
    const m    = medalFor(p.Posicion);
    const prev = prevPos(p.Nombre, idx);
    return `<div class="bar-row">
      <span class="rank" style="background:${m.bg}">${m.icon}</span>
      <span class="name">${p.Nombre}</span>
      <div class="bar-wrap">
        <div class="bar-fill" style="width:${pct}%;background:${c.fill}">
          <span class="bar-pts" style="color:${c.text}">${p.Puntos}pts</span>
        </div>
      </div>
      ${moverHTML(p.Posicion, prev)}
      <span class="pjd">${p.Partidos_Jugados}P</span>
    </div>`;
  }).join("");
  document.getElementById("legend").innerHTML = Object.entries(COLORS).map(([n,c]) =>
    `<span class="li"><span class="ld" style="background:${c.fill}"></span>${n}</span>`
  ).join("");
  renderTL();
}

function renderTL() {
  document.getElementById("timeline").innerHTML = DATA.map((d,i) =>
    `<button class="dbtn${i===day?" active":""}" onclick="goTo(${i})">${fmt(d.fecha)}</button>`
  ).join("");
}

function goTo(i) { day = i; render(i); }

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById("play-btn");
  if (playing) {
    btn.textContent = "⏸ Pausar";
    iv = setInterval(() => {
      day = (day + 1) % DATA.length;
      render(day);
      if (day === DATA.length - 1) {
        playing = false;
        btn.textContent = "▶ Animar";
        clearInterval(iv);
      }
    }, 1400);
  } else {
    btn.textContent = "▶ Animar";
    clearInterval(iv);
  }
}

function renderNac() {
  document.getElementById("nac-grid").innerHTML = NAC.cuervos.map(c => {
    if (c.sin_datos) {
      return `<div class="nac-card">
        <span class="nac-bandera">🏳️</span>
        <span class="nac-nombre">${c.nombre}</span>
        <span class="nac-sin">Sin nacionalidad aún</span>
      </div>`;
    }
    const banderas = c.nacionalidades.map(n => n.bandera).join(" ");
    const paises   = c.nacionalidades.map(n => n.pais).join(" & ");
    const esDoble  = c.nacionalidades.length > 1;
    return `<div class="nac-card">
      <span class="nac-bandera">${banderas}</span>
      <span class="nac-nombre">${c.nombre}</span>
      <span class="nac-pais">${paises}</span>
      <span class="nac-puntos">${c.puntos_max} pts</span>
      ${esDoble ? '<span class="nac-doble">Doble nacionalidad 🌍</span>' : ''}
    </div>`;
  }).join("");
}

render(0);
renderNac();
</script>
</body>
</html>
